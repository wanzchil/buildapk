name: Build APK

on:
  workflow_dispatch:
    inputs:
      zip_path:
        required: true
      job_id:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ===== CHECKOUT =====
      - name: Checkout repo
        uses: actions/checkout@v4

      # ===== INSTALL DEPENDENCY =====
      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y unzip curl

      # ===== DOWNLOAD ZIP (FIX TOTAL) =====
      - name: Download ZIP
        run: |
          mkdir -p project

          URL="https://api.github.com/repos/${{ github.repository }}/contents/${{ github.event.inputs.zip_path }}"

          echo "Downloading from: $URL"

          curl -L \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.raw" \
            "$URL" \
            -o project/app.zip

          echo "=== FILE INFO ==="
          ls -lh project

          echo "=== FILE TYPE ==="
          file project/app.zip

      # ===== VALIDASI ZIP =====
      - name: Validate ZIP
        run: |
          unzip -t project/app.zip || (echo "ZIP INVALID / CORRUPT" && exit 1)

      # ===== UNZIP =====
      - name: Extract ZIP
        run: unzip project/app.zip -d project

      # ===== CEK STRUKTUR =====
      - name: Check project structure
        run: ls -R project

      # ===== SETUP JAVA =====
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      # ===== SETUP ANDROID SDK =====
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ===== SETUP FLUTTER =====
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "stable"
          cache: true

      # ===== ACCEPT LICENSE =====
      - name: Accept Licenses
        run: yes | sdkmanager --licenses

      # ===== BUILD APK =====
      - name: Build APK
        run: |
          cd project
          flutter pub get
          flutter build apk --release

      # ===== UPLOAD APK =====
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ github.event.inputs.job_id }}
          path: project/build/app/outputs/flutter-apk/app-release.apk
