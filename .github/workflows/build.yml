name: Build APK

on:
  workflow_dispatch:
    inputs:
      zip_path:
        required: true
      job_id:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y unzip curl

      - name: Download ZIP
        run: |
          mkdir -p project
          FILE="${{ github.event.inputs.zip_path }}"
          URL="https://raw.githubusercontent.com/${{ github.repository }}/main/${FILE}"
          curl -L "$URL" -o project/app.zip

      - name: Extract ZIP
        run: unzip project/app.zip -d project

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "stable"

      - name: Accept Licenses
        run: yes | sdkmanager --licenses

      - name: Build APK
        run: |
          cd project
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ github.event.inputs.job_id }}
          path: project/build/app/outputs/flutter-apk/app-release.apk
