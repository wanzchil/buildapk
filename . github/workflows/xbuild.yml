name: Build APK

on:
  workflow_dispatch:
    inputs:
      zip_url:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.0"

      - name: Download ZIP
        run: |
          mkdir project
          curl -L "${{ github.event.inputs.zip_url }}" -o project.zip

      - name: Extract ZIP
        run: |
          unzip project.zip -d project

      - name: Build APK
        run: |
          cd project
          flutter pub get
          flutter build apk --release

      - name: Move APK
        run: |
          mkdir -p builds
          cp project/build/app/outputs/flutter-apk/app-release.apk builds/
